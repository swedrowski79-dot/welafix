version: "3.9"

services:
  welafix-schnittstelle:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: welafix-schnittstelle
    ports:
      - "8088:80"
    volumes:
      - ./app:/var/www/html
      - ./storage:/var/www/html/storage
      - ./logs:/var/www/html/logs
      # Optional: Host-Verzeichnisse für Bilder/Dokumente einbinden (anpassen)
      - "C:\\Welafix_old\\AFS\\Webshop\\Photos:/var/www/html/storage/pictures:ro"
      - "C:\\Welafix_old\\AFS\\Webshop\\Dokumente:/var/www/html/storage/documents:ro"
      - "C:\\Welafix_old\\AFS\\Webshop\\data:/var/www/html/storage/data:ro"
    environment:
      APP_ENV: "local"
      TZ: "Europe/Berlin"
    env_file:
      - ./.env
    depends_on:
      welafix-db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  welafix-db:
    image: mariadb:11
    container_name: welafix-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      TZ: "Europe/Berlin"
      MARIADB_ROOT_PASSWORD: "${LOCAL_DB_ROOT_PASSWORD:-root}"
      MARIADB_DATABASE: "${LOCAL_DB_NAME:-welafix}"
      MARIADB_USER: "${LOCAL_DB_USER:-welafix}"
      MARIADB_PASSWORD: "${LOCAL_DB_PASS:-welafix}"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-flush-log-at-trx-commit=2
      - --sync-binlog=0
    volumes:
      - ./storage/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$$MARIADB_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
